{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TOPORAHMA{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}TOPORAHMA : solution tout-en-un pour la topographie, l'urbanisme, la visualisation 3D et le calcul d'ingenierie.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    {% block favicon %}
    <link rel="icon" type="image/x-icon" href="{% static 'images/bourahma.png' %}">
    {% endblock %}
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
